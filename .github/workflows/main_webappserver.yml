name: Build and deploy Node.js app to Azure Web App - webappserver
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1: The Security Gate (CodeQL)
  # ==========================================
  security-scan:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # JavaScript covers both Node.js and TypeScript
          languages: javascript
          disable-default-queries: false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # JOB 2: Build and Deploy (Waits for Security)
  # ==========================================
  build-and-deploy:
    name: Build and Deploy to Azure App Service
    needs: security-scan
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present
          
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webappserver'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
          